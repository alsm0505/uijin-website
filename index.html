<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINUIJIN Portfolio</title>
    <style>
        /* --- 기본 설정 --- */
        html {
            scroll-behavior: smooth; /* 링크 클릭 시 부드러운 스크롤 효과 */
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            padding: 0 40px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- 헤더 (Header) --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100px;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        /* 로고 스타일: 클릭 가능하게 변경 */
        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: -0.5px;
            cursor: pointer;
            display: inline-block;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        /* --- 프로젝트 그리드 (3컬럼) --- */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding-bottom: 60px;
        }

        /* --- 프로젝트 카드 --- */
        .project-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            display: block;
        }

        .project-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .project-card:hover img {
            transform: scale(1.05);
        }

        /* --- 호버 인터랙션 (Dim + 슬라이딩 페이드인) --- */
        .project-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .project-card:hover .project-overlay {
            opacity: 1;
        }

        .hover-element {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: transform 0.4s ease, opacity 0.4s ease, top 0.4s ease, bottom 0.4s ease;
        }

        /* 상단 텍스트 (top: 18px) */
        .hover-text-top {
            color: #FFFFFF;
            font-size: 24px;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            top: 0px; 
            transform: translate(-50%, -10px);
        }

        .project-card:hover .hover-text-top {
            top: 18px;
            transform: translate(-50%, 0);
            opacity: 1;
        }

        /* 하단 버튼 (bottom: 18px) */
        .hover-button-bottom {
            width: 60px;
            height: 60px;
            background-color: #FFFFFF;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            bottom: 0px;
            transform: translate(-50%, 10px);
        }

        .project-card:hover .hover-button-bottom {
            bottom: 18px;
            transform: translate(-50%, 0);
            opacity: 1;
        }

        .hover-button-bottom svg {
            width: 30px;
            height: 30px;
        }

        @media (max-width: 768px) {
            body { padding: 0 20px; }
            .portfolio-grid {
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>
<body>
