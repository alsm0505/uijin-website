<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINUIJIN Portfolio</title>
    <style>
        /* --- 기본 설정 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            padding: 0 40px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- 헤더 (Header) --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100px;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold; /* 좌측 로고 볼드 */
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        /* --- 프로젝트 그리드 (3컬럼 수정) --- */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 4열에서 3열로 수정됨 */
            gap: 25px; /* 간격 살짝 조정 */
            padding-bottom: 60px;
        }

        /* --- 프로젝트 카드 및 호버 효과 --- */
        .project-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 1 / 1; /* 썸네일을 정정사각형으로 통일 (필요 시 제거 가능) */
            cursor: pointer;
        }

        .project-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .project-card:hover img {
            transform: scale(1.1); /* 호버 시 이미지 미세 확대 */
        }

        /* 호버 시 나타나는 딤(Dim) 레이어 */
        .project-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* 60% 투명도 딤 처리 */
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0; /* 평소엔 숨김 */
            transition: opacity 0.4s ease;
            padding: 20px;
        }

        .project-card:hover .project-overlay {
            opacity: 1; /* 호버 시 페이드인 */
        }

        .project-title {
            color: #ffffff;
            font-size: 18px;
            font-weight: 600;
            text-align: center;
        }

        /* 반응형 (모바일) */
        @media (max-width: 768px) {
            body { padding: 0 20px; }
            .portfolio-grid {
                grid-template-columns: repeat(1, 1fr); /* 모바일에선 1열 */
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">MINUIJIN</div>
        <nav class="nav-links">
            <a href="#work">WORK</a>
            <a href="#about">ABOUT</a>
            <a href="#contact">CONTACT</a>
        </nav>
    </header>

    <main class="portfolio-grid">
        <div class="project-card">
            <img src="work1.jpg" alt="Project 1">
            <div class="project-overlay">
                <div class="project-title">Project Title 01</div>
            </div>
        </div>

        <div class="project-card">
            <img src="work2.jpg" alt="Project 2">
            <div class="project-overlay">
                <div class="project-title">Project Title 02</div>
            </div>
        </div>

        <div class="project-card">
            <img src="work3.jpg" alt="Project 3">
            <div class="project-overlay">
                <div class="project-title">Project Title 03</div>
            </div>
        </div>

        <div class="project-card">
            <img src="work4.jpg" alt="Project 4">
            <div class="project-overlay">
                <div class="project-title">Project Title 04</div>
            </div>
        </div>

        <div class="project-card">
            <img src="work5.jpg" alt="Project 5">
            <div class="project-overlay">
                <div class="project-title">Project Title 05</div>
            </div>
        </div>

        <div class="project-card">
            <img src="work6.jpg" alt="Project 6">
            <div class="project-overlay">
                <div class="project-title">Project Title 06</div>
            </div>
        </div>

        <div class="project-card">
            <img src="work7.jpg" alt="Project 7">
            <div class="project-overlay">
                <div class="project-title">Project Title 07</div>
            </div>
        </div>

        <div class="project-card">
            <img src="work8.jpg" alt="Project 8">
            <div class="project-overlay">
                <div class="project-title">Project Title 08</div>
            </div>
        </div>
    </main>

</body>
</html>
