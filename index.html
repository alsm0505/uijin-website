<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINUIJIN Portfolio</title>
    <style>
        /* --- 기본 설정 --- */
        html {
            scroll-behavior: smooth;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            padding: 0 40px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- 헤더 (Header) --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100px;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: -0.5px;
            cursor: pointer;
            display: inline-block;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        /* --- 프로젝트 그리드 (3컬럼) --- */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding-bottom: 60px;
        }

        /* --- 프로젝트 카드 --- */
        .project-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            display: block;
        }

        .project-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .project-card:hover img {
            transform: scale(1.05);
        }

        /* --- 호버 인터랙션 (Dim + 슬라이딩 페이드인) --- */
        .project-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* 딤 처리 */
            opacity: 0;
            transition: opacity 0.4s ease;
            z-index: 10;
        }

        .project-card:hover .project-overlay {
            opacity: 1;
        }

        .hover-element {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            transition: transform 0.4s ease, opacity 0.4s ease, top 0.4s ease, bottom 0.4s ease;
        }

        /* 1. 상단 텍스트 (#FFFFFF 100%, top: 18px, 폰트 18px 수정) */
        .hover-text-top {
            color: #FFFFFF;
            font-size: 18px; /* 요청하신 대로 18px로 수정 */
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            top: 0px; 
            transform: translate(-50%, -10px);
        }

        .project-card:hover .hover-text-top {
            top: 18px;
            transform: translate(-50%, 0);
            opacity: 1;
        }

        /* 2. 하단 동그란 버튼 (#FFFFFF 100%, bottom: 18px) */
        .hover-button-bottom {
            width: 60px;
            height: 60px;
            background-color: #FFFFFF;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            bottom: 0px;
            transform: translate(-50%, 10px);
        }

        .project-card:hover .hover-button-bottom {
            bottom: 18px;
            transform: translate(-50%, 0);
            opacity: 1;
        }

        /* --- 핵심 수정: 버튼 안의 화살표 아이콘 (흰색으로 변경 및 크기 조정) --- */
        .hover-button-bottom svg {
            width: 32px; /* 버튼 크기에 맞춰 조정 */
            height: 32px;
        }

        /* 반응형 (모바일) */
        @media (max-width: 768px) {
            body { padding: 0 20px; }
            .portfolio-grid {
                grid-template-columns: repeat(1, 1fr);
            }
            .hover-text-top { font-size: 16px; top: 15px; }
            .hover-button-bottom { width: 50px; height: 50px; bottom: 15px; }
            .hover-button-bottom svg { width: 24px; height: 24px; }
        }
    </style>
</head>
<body>

    <header id="top">
        <a href="#top" class="logo">MINUIJIN</a> 
        <nav class="nav-links">
            <a href="#work">WORK</a>
            <a href="#about">ABOUT</a>
            <a href="#contact">CONTACT</a>

                    <svg viewBox="0 0 24 24"><use href="#arrow-icon"></use></svg>

            </div>
        </div>

        <div class="project-card">

            </div>

        <div class="project-card">

            <div class="project-overlay">

                <div class="hover-element hover-button-bottom">
                    <svg viewBox="0 0 24 24"><use href="#arrow-icon"></use></svg>

        </div>

        <a href="#about" class="project-card">
            <img src="work4.jpg" alt="ABOUT Link">
            <div class="project-overlay">

            </div>
        </a>

        <div class="project-card">
            <img src="work5.jpg" alt="Promotion 2">
            <div class="project-overlay">
                <div class="hover-element hover-text-top">Promotion</div>
                <div class="hover-element hover-button-bottom">
                    <svg viewBox="0 0 24 24"><use href="#arrow-icon"></use></svg>
                </div>
            </div>
        </div>

        <div class="project-card">
            <img src="work6.jpg" alt="Promotion 3">
            <div class="project-overlay">
                <div class="hover-element hover-text-top">Promotion</div>
                <div class="hover-element hover-button-bottom">
                    <svg viewBox="0 0 24 24"><use href="#arrow-icon"></use></svg>
                </div>
            </div>
        </div>

        <div class="project-card">
            <img src="work7.jpg" alt="UIUX 3">
            <div class="project-overlay">
                <div class="hover-element hover-text-top">UIUX</div>
                <div class="hover-element hover-button-bottom">
                    <svg viewBox="0 0 24 24"><use href="#arrow-icon"></use></svg>
                </div>
            </div>
        </div>

        <div class="project-card">
            <img src="work8.jpg" alt="UIUX 4">
            <div class="project-overlay">
                <div class="hover-element hover-text-top">UIUX</div>
                <div class="hover-element hover-button-bottom">
                    <svg viewBox="0 0 24 24"><use href="#arrow-icon"></use></svg>
                </div>
            </div>
        </div>
    </main>

    <section id="about" style="height: 100vh; padding: 100px 40px; background-color: #f9f9f9;">
        <h2>About Section</h2>
        <p>This is where the about information goes.</p>
    </section>

</body>
</html>
