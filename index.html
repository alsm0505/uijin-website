<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINUIJIN Portfolio</title>
    <style>
        /* --- 기본 설정 --- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            padding: 0 40px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        /* --- 헤더 (Header) --- */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100px;
            background-color: #ffffff;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            letter-spacing: -0.5px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            font-size: 14px;
            font-weight: 500;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        /* --- 프로젝트 그리드 (3컬럼) --- */
        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            padding-bottom: 60px;
        }

        /* --- 프로젝트 카드 --- */
        .project-card {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            aspect-ratio: 1 / 1; /* 정사각형 통일 */
            cursor: pointer;
            display: block; /* 링크로 감쌀 때 필요 */
        }

        .project-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            transition: transform 0.5s ease;
        }

        .project-card:hover img {
            transform: scale(1.05); /* 호버 시 미세 확대 */
        }

        /* --- 핵심: 새로운 호버 인터랙션 (Dim + 슬라이딩 페이드인) --- */
        .project-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); /* #000000 60% 딤 처리 */
            display: flex;
            flex-direction: column;
            justify-content: center; /* 수직 중앙 정렬 */
            align-items: center;    /* 수평 중앙 정렬 */
            opacity: 0; /* 평소엔 숨김 */
            transition: opacity 0.4s ease; /* 전체 페이드인 */
            padding: 20px;
            z-index: 10;
        }

        .project-card:hover .project-overlay {
            opacity: 1; /* 호버 시 전체 배경 나타남 */
        }

        /* 1. 상단 텍스트 (위에서 아래로) */
        .hover-text-top {
            color: #ffffff;
            font-size: 28px; /* image_2 참고 */
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: absolute;
            top: 25%; /* 위치 고정 */
            
            /* 애니메이션 초기 상태: 위로 살짝 이동 및 숨김 */
            transform: translateY(-20px);
            opacity: 0;
            transition: transform 0.4s ease, opacity 0.4s ease;
            transition-delay: 0.1s; /* 살짝 늦게 시작 */
        }

        .project-card:hover .hover-text-top {
            /* 호버 시: 원위치 및 나타남 */
            transform: translateY(0);
            opacity: 1;
        }

        /* 2. 하단 화살표 버튼 (아래에서 위로) */
        .hover-button-bottom {
            width: 80px; /* image_2 참고 */
            height: 80px;
            background-color: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            position: absolute;
            bottom: 15%; /* 위치 고정 */
            
            /* 애니메이션 초기 상태: 아래로 살짝 이동 및 숨김 */
            transform: translateY(20px);
            opacity: 0;
            transition: transform 0.4s ease, opacity 0.4s ease;
            transition-delay: 0.15s; /* 텍스트보다 살짝 더 늦게 */
        }

        .project-card:hover .hover-button-bottom {
            /* 호버 시: 원위치 및 나타남 */
            transform: translateY(0);
            opacity: 1;
        }

        /* 화살표 SVG (검은색) */
        .hover-button-bottom svg {
            width: 40px;
            height: 40px;
        }

        /* 반응형 (모바일) */
        @media (max-width: 768px) {
            body { padding: 0 20px; }
            .portfolio-grid {
                grid-template-columns: repeat(1, 1fr); /* 1열 */
            }
            .hover-text-top { font-size: 20px; top: 30%; }
            .hover-button-bottom { width: 60px; height: 60px; bottom: 20%; }
            .hover-button-bottom svg { width: 30px; height: 30px; }
        }
    </style>
</head>
